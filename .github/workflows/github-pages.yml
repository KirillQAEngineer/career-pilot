name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute GitHub Pages paths
        run: |
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"
          echo "BASE_PATH=/${REPOSITORY_NAME}/" >> "$GITHUB_ENV"
          echo "DOCS_BASE_URL=/${REPOSITORY_NAME}/docs/" >> "$GITHUB_ENV"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: jobcompass_ui
        run: flutter pub get

      - name: Build Flutter Web
        working-directory: jobcompass_ui
        run: |
          flutter build web \
            --release \
            --base-href "$BASE_PATH" \
            --dart-define=API_BASE_URL="${API_BASE_URL:-http://localhost:8000}"
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install documentation dependencies
        working-directory: docs
        run: npm install

      - name: Build documentation
        working-directory: docs
        run: npm run build

      - name: Attach documentation to Flutter Web output
        run: |
          mkdir -p jobcompass_ui/build/web/docs
          cp -R docs/build/. jobcompass_ui/build/web/docs/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: jobcompass_ui/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
