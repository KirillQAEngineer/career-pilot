name: jobcompass_ui
description: JobCompass AI
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  url_launcher: ^6.3.2

  # Navigation
  go_router: ^16.0.0

  # State management
  flutter_riverpod: ^3.0.0

  # HTTP
  dio: ^5.9.0

  # Storage
  shared_preferences: ^2.5.3

  # Fonts
  google_fonts: ^6.3.2

  # SVG
  flutter_svg: ^2.2.1

  # Cached images
  cached_network_image: ^3.4.1

  # Loading
  flutter_spinkit: ^5.2.2

  # Icons
  hugeicons: ^0.0.11

  # Animations
  animations: ^2.0.11

  # JSON
  json_annotation: ^4.9.0

  # Models
  freezed_annotation: ^3.1.0

  # Utilities
  intl: ^0.20.2
  collection: ^1.19.1
  equatable: ^2.0.7
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.6.0
  json_serializable: ^6.11.1
  freezed: ^3.2.3

flutter:
  uses-material-design: true
